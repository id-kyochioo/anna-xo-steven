<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Zeit</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fdf2f8;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            color: #db2777;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            font-weight: normal;
        }
        #timer {
            font-size: 1.8em;
            font-weight: bold;
            line-height: 1.6;
            color: #111;
        }
        .label {
            font-size: 0.5em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Steven & Anna</h1>
        <h2>Seit unserem ersten Treffen ist so viel Zeit vergangen:</h2>
        
        <div id="timer">Berechne Zeit...</div>
    </div>

    <script>
        // Startdatum: 23. Juni 2023 um 22:23 Uhr
        const startDate = new Date(2023, 5, 23, 22, 23, 0); 

        function updateTimer() {
            const now = new Date();
            const difference = now - startDate;

            // Zuerst die gesamten Tage berechnen
            const totalDays = Math.floor(difference / (1000 * 60 * 60 * 24));
            
            // Davon die Jahre und die restlichen Tage ableiten (mit 365.25 wegen Schaltjahren)
            const years = Math.floor(totalDays / 365.25);
            const days = Math.floor(totalDays % 365.25);
            
            // Stunden, Minuten, Sekunden wie bisher
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            // Alles zusammenbauen
            document.getElementById('timer').innerHTML = 
                years + "<span class='label'>Jahre</span><br>" +
                days + "<span class='label'>Tage</span><br>" +
                hours + "<span class='label'>Stunden</span><br>" +
                minutes + "<span class='label'>Minuten</span><br>" +
                seconds + "<span class='label'>Sekunden</span>";
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>

</body>
</html>
